<script>
let agenda = {};
let diasFechados = [];
let bloqueios = {};

const PRECOS = {
  "Corte":25,
  "Pezinho":10,
  "Corte Simples": 25,
  "Corte Disfarçado":35,
  "Corte Máq E Tes":35,
  "Barba Simples": 15,
  "Barba Modelada":25,
  "Pigmentação": 20,
  "Reflexo": 50,
  "Descoloração": 70,
  "Corte Disfarçado + Barba": 50
};
function formatarDataLocal(dataISO) {
  if (!dataISO) return "";

  const data = new Date(dataISO + "T00:00:00");
  
  return data.toLocaleDateString("pt-BR", {
    day: "numeric",
    month: "long",
    year: "numeric"
  });
}
function seguro(valor, padrao = []) {
  return Array.isArray(valor) ? valor : padrao;
}

function escutarAgendaTempoReal() {
  db.collection("agenda").onSnapshot(snapshot => {
    agenda = {};

   snapshot.forEach(doc => {
    const dados = doc.data();

    if (!dados || typeof dados !== "object") return;

    agenda[doc.id] = dados;
});

    mostrarStats();
    mostrarAgendaCompleta();
    mostrarAgendaHoje();
  });
}
async function carregarDadosAdmin() {
  try {

    // agenda
    const snapshot = await db.collection("agenda").get();
    agenda = {};
    snapshot.forEach(doc => {
      agenda[doc.id] = doc.data();
    });

    // dias fechados
    const diasDoc = await db.collection("config").doc("diasFechados").get();
    diasFechados = (diasDoc.exists && diasDoc.data().lista)
      ? diasDoc.data().lista
      : [];

    // 🔥 BLOQUEIOS
    const bloqueioDoc = await db.collection("config").doc("bloqueios").get();
    bloqueios = bloqueioDoc.exists ? bloqueioDoc.data() : {};

    mostrarStats();
    mostrarAgendaCompleta();
    mostrarStatusDias();
    mostrarAgendaHoje();
    

  } catch (erro) {
    console.error("Erro admin:", erro);
    alert("Erro ao carregar 😢");
  }
}

//INICIALIZAÇAO
document.addEventListener('DOMContentLoaded', function() {
  escutarAgendaTempoReal();
  escutarConfigTempoReal();
  escutarPacotesPublico(); // o
});

function escutarConfigTempoReal() {
  db.collection("config").doc("diasFechados")
    .onSnapshot(doc => {
      diasFechados = doc.exists ? doc.data().lista : [];
      mostrarStats();
      mostrarAgendaCompleta();
      mostrarStatusDias();
      
    });
}

function escutarAssinaturas(){
  db.collection("assinaturas").onSnapshot(snapshot => {
    const div = document.getElementById("listaAssinaturas");

    if(!div) return;

    div.innerHTML = "<h4>Clientes que solicitaram pacote:</h4>";

    snapshot.forEach(doc => {
      const a = doc.data();

      div.innerHTML += `
        <div style="background:#222; padding:12px; border-radius:10px; margin:10px 0;">
          <strong>👤 ${a.nome}</strong><br>
          📦 ${a.pacote}<br>
          💰 R$ ${a.preco}<br>
          📌 Status: <span style="color:${a.status === 'pago' ? '#25D366' : '#f39c12'}">
            ${a.status}
          </span><br><br>

          ${
            a.status !== "pago"
            ? `<button class="success" onclick="confirmarPagamento('${doc.id}')">
                Confirmar pagamento
               </button>`
            : `<span style="color:#25D366;">✔ Pago</span>`
          }
        </div>
      `;
    });
  });
}
async function confirmarPagamento(id){
  await db.collection("assinaturas").doc(id).update({
    status: "pago"
  });

  alert("✅ Pagamento confirmado!");
}
function escutarPacotesPublico() {
  db.collection("pacotes").onSnapshot(snapshot => {

    if(!div) return;

    div.innerHTML = "";

    snapshot.forEach(doc => {

      div.innerHTML += `

          <small>${p.descricao}</small><br>
          <strong style="color:#25D366;">R$ ${p.preco}</strong>
        </div>
      `;
    });
  });
}
function escutarPacotesAdmin() {
  db.collection("pacotes").onSnapshot(snapshot => {
    const div = document.getElementById("listaPacotesAdmin");

    if(!div) return;

    div.innerHTML = "<h4>Pacotes cadastrados:</h4>";

    snapshot.forEach(doc => {

      div.innerHTML += `

          <strong>R$ ${p.preco}</strong><br><br>

          <button class="danger" onclick="excluirPacote('${doc.id}')">
            Excluir
          </button>

      `;
    });

}
async function carregarAssinaturas(){
  const div = document.getElementById("listaAssinaturas");
  div.innerHTML = "Carregando...";

  const snap = await db.collection("assinaturas").get();

  if(snap.empty){
    div.innerHTML = "Nenhuma assinatura";
    return;
  }

  let html = "";

  snap.forEach(doc => {
    const a = doc.data();

    html += `
     <div class="card-assinatura">
    
      <div class="topo-assinatura">
        <h3>${a.nome}</h3>
        <span class="status ${a.status}">${a.status}</span>
      </div>

      <div class="info-assinatura">
        <p>📦 ${a.pacote}</p>
        <p>📊 Usos: <strong>${a.usos || 0}</strong></p>
      </div>

      <div class="acoes-assinatura">
        <button onclick="ativarAssinatura('${doc.id}')" class="btn-ativar">Ativar</button>
        <button onclick="bloquearAssinatura('${doc.id}')" class="btn-bloquear">Bloquear</button>
        <button onclick="resetarUso('${doc.id}')" class="btn-reset">Resetar</button>
      </div>

  </div>
`;
  });

  div.innerHTML = html;
}
async function ativarAssinatura(id){
  await db.collection("assinaturas").doc(id).update({
    status: "pago",
    usos: 0
  });
  carregarAssinaturas();
}

async function bloquearAssinatura(id){
  await db.collection("assinaturas").doc(id).update({
    status: "pendente"
  });
  carregarAssinaturas();
}

async function resetarUso(id){
  await db.collection("assinaturas").doc(id).update({
    usos: 0
  });
  carregarAssinaturas();
}
async function salvarAgendaFirebase() {
  for (let data in agenda) {
    await db.collection("agenda").doc(data).set(agenda[data]);
  }
}

async function salvarDiasFirebase() {
  await db.collection("config").doc("diasFechados").set({
    lista: diasFechados
  });
}

async function bloquearHorario() {
  const prof = document.getElementById("bloqProf").value;
  const horario = document.getElementById("bloqHorario").value;
  const data = document.getElementById("bloqData").value;

  if(!prof || !horario || !data){
    return alert("❌ Preencha tudo!");
  }

  const ref = db.collection("config").doc("bloqueios");
  const doc = await ref.get();

  let dados = doc.exists ? doc.data() : {};

  if(!dados[data]) dados[data] = {};
  if(!dados[data][prof]) dados[data][prof] = [];

  // evita duplicado
  if(!dados[data][prof].includes(horario)){
    dados[data][prof].push(horario);
  }

  await ref.set(dados);

  await carregarDadosAdmin(); // 🔥 ESSENCIAL

  alert("🚫 Horário bloqueado!");
}

async function desbloquearHorario() {
  const prof = document.getElementById("bloqProf").value;
  const horario = document.getElementById("bloqHorario").value;
  const data = document.getElementById("bloqData").value;

  const ref = db.collection("config").doc("bloqueios");
  const doc = await ref.get();

  if(!doc.exists) return;

  let dados = doc.data();

  if(dados[data] && dados[data][prof]){
    dados[data][prof] = dados[data][prof].filter(h => h !== horario);

    // limpa vazio
    if(dados[data][prof].length === 0){
      delete dados[data][prof];
    }

    if(Object.keys(dados[data]).length === 0){
      delete dados[data];
    }
  }

  await ref.set(dados);

  await carregarDadosAdmin(); // 🔥 ESSENCIAL

  alert("✅ Horário liberado!");
}


async function desbloquearHorarioDireto(data, prof, horario){
  const ref = db.collection("config").doc("bloqueios");
  const doc = await ref.get();

  if(!doc.exists) return;

  let dados = doc.data();

  dados[data][prof] = dados[data][prof].filter(h => h !== horario);

  if(dados[data][prof].length === 0) delete dados[data][prof];
  if(Object.keys(dados[data]).length === 0) delete dados[data];

  await ref.set(dados);

  await carregarDadosAdmin();
}

function mostrarStats() {
  let total = 0;
  let porProf = {};

  let faturamentoTotal = 0;
  let faturamentoHoje = 0;
  let faturamentoMes = 0;

  let faturamentoPrevisto = 0;
  let faturamentoRealizado = 0;

  let faturamentoPorProf = {};

  let hoje = getDataHojeLocal();
  let hojeTotal = 0;

  let proximosHoje = [];

  const agora = new Date();

  Object.entries(agenda).forEach(([data, profs]) => {
    if (!diasFechados.includes(data)) {

      Object.entries(profs).forEach(([prof, horarios]) => {

        (horarios || []).forEach(h => {

          const horario = typeof h === "string" ? h : h.horario;
          const dataHora = new Date(`${data}T${horario}`);
          const passou = dataHora < agora;

          const nome = typeof h === "string" ? "Cliente" : h.nome;

          const servico = h.servicos || h.servico || "Corte";
          if (!PRECOS[servico]) return;

          const valor = PRECOS[servico];

          const dataObj = new Date(data);
          const hojeObj = new Date();

          const mesmoMes =
            dataObj.getMonth() === hojeObj.getMonth() &&
            dataObj.getFullYear() === hojeObj.getFullYear();

          // 🔥 TOTAL (histórico completo)
          total++;
          faturamentoTotal += valor;

          // 💰 por profissional
          porProf[prof] = (porProf[prof] || 0) + 1;
          faturamentoPorProf[prof] = (faturamentoPorProf[prof] || 0) + valor;

          // 🟢 FUTURO (previsto)
          if (!passou) {
            faturamentoPrevisto += valor;

            if (data === hoje) {
              faturamentoHoje += valor;
              hojeTotal++;

              proximosHoje.push({
                horario,
                nome,
                prof
              });
            }

            if (mesmoMes) {
              faturamentoMes += valor;
            }
          }

          // 🔴 PASSADO (realizado)
          if (passou) {
            faturamentoRealizado += valor;
          }

        });

      });

    }
  });

  let topProf = Object.keys(porProf).sort((a, b) => porProf[b] - porProf[a])[0] || "-";

  proximosHoje.sort((a, b) => a.horario.localeCompare(b.horario));

  let html = `

  <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px;">

    <div style="background:#111; padding:15px; border-radius:12px; text-align:center;">
      <h2 style="margin:0; color:#d4af37;">${total}</h2>
      <small>Total Agendamentos</small>
    </div>

    <div style="background:#111; padding:15px; border-radius:12px; text-align:center;">
      <h2 id="faturamentoValor" style="margin:0; color:#25D366; cursor:pointer;">
        R$ ${faturamentoHoje}
      </h2>
      <small id="faturamentoLabel">Faturamento Hoje</small>

      <div style="margin-top:8px; font-size:12px; color:#aaa;">
        🟢 Previsto: R$ ${faturamentoPrevisto} <br>
        🔴 Realizado: R$ ${faturamentoRealizado}
      </div>
    </div>

    <div style="background:#111; padding:15px; border-radius:12px; text-align:center;">
      <h2 style="margin:0; color:#3498db;">${hojeTotal}</h2>
      <small>Hoje (pendentes)</small>
    </div>

    <div style="background:#111; padding:15px; border-radius:12px; text-align:center;">
      <h2 style="margin:0; color:#e74c3c;">${diasFechados.length}</h2>
      <small>Dias Fechados</small>
    </div>

    <div style="background:#111; padding:15px; border-radius:12px; text-align:center;">
      <h2 style="margin:0; color:#f1c40f;">${topProf}</h2>
      <small>Top Profissional</small>
    </div>

  </div>

  <div style="margin-top:20px;">
    <h3 style="color:#d4af37;">📊 Por Profissional</h3>
  `;

  Object.keys(porProf).forEach(prof => {
    html += `
      <div style="margin:8px 0; padding:10px; background:#222; border-radius:8px;">
        <strong>${prof}</strong><br>
        ✂️ ${porProf[prof]} atendimentos<br>
        💰 R$ ${faturamentoPorProf[prof] || 0}
      </div>
    `;
  });


  html += `</div>`;

  document.getElementById("stats").innerHTML = html;

  // 🔥 TOGGLE INTELIGENTE
  let modo = "hoje";

  document.getElementById("faturamentoValor").onclick = () => {
    if (modo === "hoje") {
      modo = "mes";
      faturamentoValor.innerText = "R$ " + faturamentoMes;
      faturamentoLabel.innerText = "Faturamento Mês (previsto)";
    } 
    else if (modo === "mes") {
      modo = "total";
      faturamentoValor.innerText = "R$ " + faturamentoTotal;
      faturamentoLabel.innerText = "Faturamento Total";
    } 
    else {
      modo = "hoje";
      faturamentoValor.innerText = "R$ " + faturamentoHoje;
      faturamentoLabel.innerText = "Faturamento Hoje";
    }
  };
}

function mostrarAgendaHoje() {
  const hoje = getDataHojeLocal();
  const agora = new Date();

  let lista = [];

  if (agenda[hoje]) {
    Object.entries(agenda[hoje]).forEach(([prof, horarios]) => {
      (horarios || []).forEach(h => {

        const horario = typeof h === "string" ? h : h.horario;
        const nome = typeof h === "string" ? "Cliente" : h.nome;
        const servico = h.servicos || h.servico || "Corte";

        const dataHora = new Date(`${hoje}T${horario}`);

        // só futuros
        if (dataHora >= agora) {
          lista.push({
            horario,
            nome,
            servico,
            prof
          });
        }
      });
    });
  }

  lista.sort((a, b) => a.horario.localeCompare(b.horario));

  let html = "";

  if (lista.length === 0) {
    html = "<p>Sem atendimentos hoje</p>";
  } else {
    lista.forEach(item => {
      html += `
        <div class="item-agenda">
          <strong>${item.horario}</strong> - ${item.prof}<br>
          👤 ${item.nome}<br>
          🛠️ ${item.servico}<
          
        </div>
      `;
    });
  }

  document.getElementById("agendaHoje").innerHTML = html;
}

function mostrarAgendaCompleta() {
  let html = "";

  if(Object.keys(agenda).length === 0) {
    document.getElementById("agendaCompleta").innerHTML = "<p>📭 Sem agendamentos</p>";
    return;
  }

  let agendaPorProfissional = {};

  // Organiza por profissional
 Object.entries(agenda || {}).forEach(([data, profs]) => {

  if (!profs || typeof profs !== "object") return;

  Object.entries(profs).forEach(([prof, horarios]) => {

    if (!Array.isArray(horarios)) return;

    if (!agendaPorProfissional[prof]) {
      agendaPorProfissional[prof] = {};
    }

    agendaPorProfissional[prof][data] = horarios;

  });

});

  // Renderiza
  Object.entries(agendaPorProfissional).forEach(([prof, datas]) => {

    html += `
      <div style="margin-bottom:25px; padding:15px; border:1px solid gold; border-radius:12px;">
        <h3 style="color:gold;">👨‍💼 ${prof}</h3>
    `;

    Object.entries(datas)
      .sort(([a], [b]) => new Date(a) - new Date(b))
      .forEach(([data, horarios]) => {

        const dataFormatada = new Date(data + "T00:00:00").toLocaleDateString("pt-BR", {
          day: "numeric",
          month: "long",
          weekday: "short"
      });

        html += `<div style="margin:10px 0;">`;
        html += `<strong>📅 ${dataFormatada}</strong><br>`;

        (horarios || []).forEach(h => {

          if (!h) return;
          const horario = typeof h === "string" ? h : h.horario;
          const nome = typeof h === "string" ? "Cliente" : h.nome;

          html += `
            <span class="badge" style="background:#e74c3c;">
              ${horario} - ${nome}
              <button class="danger" onclick="liberar('${data}','${prof}','${horario}')" 
              style="margin-left:5px; padding:2px 6px;">✕</button>
            </span>
          `;
        });

        html += `</div>`;
      });

    html += `</div>`;
  });

  document.getElementById("agendaCompleta").innerHTML = html;
}

async function liberar(data, prof, horario) {
  if (!confirm(`Liberar horário ${horario} do ${prof}?`)) return;

  const ref = db.collection("agenda").doc(data);
  const doc = await ref.get();

  if (!doc.exists) return;

  let dados = doc.data();

  if (!dados[prof]) return;

  // 🔥 REMOVE CERTO (OBJETO OU STRING)
  dados[prof] = dados[prof].filter(item => {
    const h = typeof item === "string" ? item : item.horario;
    return h !== horario;
  });

  // limpa estrutura
  if (dados[prof].length === 0) delete dados[prof];

  if (Object.keys(dados).length === 0) {
    await ref.delete();
    delete agenda[data]; // 🔥 remove do estado local
  } else {
    await ref.set(dados);
    agenda[data] = dados; // 🔥 atualiza local
  }

  // 🔥 atualiza interface SEM precisar dar F5
  carregarAdmin();

  alert("✅ Horário liberado!");
}

function adicionarHorario() {
  const prof = document.getElementById("novoProf").value.trim();
  const horario = document.getElementById("novoHorario").value.trim();
  const data = document.getElementById("dataAdicionar").value;

  if(!prof || !horario || !data) {
    return alert("❌ Preencha todos os campos!");
  }

  if(diasFechados.includes(data)) {
    return alert("❌ Este dia está fechado!");
  }

  if(!agenda[data]) agenda[data] = {};
  if(!agenda[data][prof]) agenda[data][prof] = [];

  // Verificar se horário já existe
  if(agenda[data][prof].includes(horario)) {
    return alert("❌ Este horário já está ocupado!");
  }

  agenda[data][prof].push(horario);
  salvarAgendaFirebase();
  salvarDiasFirebase();
  
  // Limpar campos
  document.getElementById("novoProf").value = "";
  document.getElementById("novoHorario").value = "";
  document.getElementById("dataAdicionar").value = "";
  
  carregarDadosAdmin();
  alert(`✅ Horário ${horario} adicionado para ${prof} em ${new Date(data + "T00:00:00").toLocaleDateString('pt-BR')}!`);
}

function removerHorario() {
  const prof = document.getElementById("removerProf").value.trim();
  const horario = document.getElementById("removerHorario").value.trim();
  const data = document.getElementById("dataRemover").value;

  if(!prof || !horario || !data) {
    return alert("❌ Preencha todos os campos!");
  }

  if(diasFechados.includes(data)) {
    return alert("❌ Este dia está fechado!");
  }

  if(!agenda[data] || !agenda[data][prof]) {
    return alert("❌ Este horário não existe para este profissional nesta data!");
  }

  // Verificar se horário existe
  const index = agenda[data][prof].indexOf(horario);
  if(index === -1) {
    return alert("❌ Este horário não está agendado para este profissional!");
  }

  // Remover horário
  agenda[data][prof].splice(index, 1);
  
  if(agenda[data][prof].length === 0) delete agenda[data][prof];
  if(Object.keys(agenda[data]).length === 0) delete agenda[data];
  
  salvarAgendaFirebase();
  salvarDiasFirebase();
  
  // Limpar campos
  document.getElementById("removerProf").value = "";
  document.getElementById("removerHorario").value = "";
  document.getElementById("dataRemover").value = "";
  
  carregarDadosAdmin();
  alert(`✅ Horário ${horario} removido de ${prof} em ${new Date(data + "T00:00:00").toLocaleDateString('pt-BR')}!`);
}

function fecharDia() {
  const dia = document.getElementById("diaFechado").value;
  if(!dia) return alert("❌ Selecione uma data!");

  if(!diasFechados.includes(dia)) {
    diasFechados.push(dia);
    salvarAgendaFirebase();
    salvarDiasFirebase();
    carregarDadosAdmin();
    alert("🔒 Dia fechado com sucesso!");
  } else {
    alert("ℹ️ Este dia já está fechado!");
  }
}

function abrirDia() {
  const dia = document.getElementById("diaFechado").value;
  if(!dia) return alert("❌ Selecione uma data!");

  const index = diasFechados.indexOf(dia);
  if(index > -1) {
    diasFechados.splice(index, 1);
    salvarAgendaFirebase();
    salvarDiasFirebase();
    carregarDadosAdmin();
    alert("🔓 Dia reaberto com sucesso!");
  } else {
    alert("ℹ️ Este dia não está fechado!");
  }
}

async function criarPacote() {
  const nome = document.getElementById("pacoteNome").value.trim();
  const descricao = document.getElementById("pacoteDescricao").value.trim();
  const preco = Number(document.getElementById("pacotePreco").value);

  if(!nome || !descricao || !preco){
    return alert("❌ Preencha todos os campos!");
  }

  await db.collection("pacotes").add({
    nome,
    descricao,
    preco
  });

  document.getElementById("pacoteNome").value = "";
  document.getElementById("pacoteDescricao").value = "";
  document.getElementById("pacotePreco").value = "";

  alert("✅ Pacote criado!");
}

async function excluirPacote(id){
  if(!confirm("Excluir pacote?")) return;

  await db.collection("pacotes").doc(id).delete();

  alert("🗑️ Pacote removido!");
}
function getDataHojeLocal() {
  const hoje = new Date();
  const ano = hoje.getFullYear();
  const mes = String(hoje.getMonth() + 1).padStart(2, '0');
  const dia = String(hoje.getDate()).padStart(2, '0');

  return `${ano}-${mes}-${dia}`; 
}
function mostrarStatusDias() {
  const hoje = getDataHojeLocal();

  let html = `<p><strong>Hoje (${new Date().toLocaleDateString('pt-BR')}):</strong> ${diasFechados.includes(hoje) ? '🔒 FECHADO' : '✅ ABERTO'}</p>`;

  if(diasFechados.length > 0) {
    html += '<p><strong>Dias Fechados:</strong></p>';

    diasFechados.slice(-5).forEach(dia => {
      const data = new Date(dia + "T00:00:00"); 
      html += `<span class="badge" style="background:#e74c3c;">${data.toLocaleDateString('pt-BR')}</span>`;
    });
  }

  document.getElementById("statusDias").innerHTML = html;
}
