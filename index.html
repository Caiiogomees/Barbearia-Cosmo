<script>
let agenda = {};
let diasFechados = [];
let dataSelecionada = "";
let nomeServico = "";
let profissional = "";
let horario = "";
let bloqueios = {};
let horariosExtras = {};

function escutarHorariosExtras() {
  db.collection("config").doc("horariosExtras")
    .onSnapshot(doc => {
      horariosExtras = doc.exists ? doc.data() : {};
    });
}
let pacotes = [];

function escutarPacotesTempoReal() {
  db.collection("pacotes").onSnapshot(snapshot => {
    pacotes = [];

    snapshot.forEach(doc => {
      pacotes.push(doc.data());
    });

    mostrarPacotes();
  });
}

function mostrarPacotes() {
  const div = document.getElementById("pacotes");

  if(pacotes.length === 0){
    div.style.display = "none";
    return;
  }

  div.style.display = "block";
  div.innerHTML = "<h3>🔥 Pacotes Mensais</h3>";

  pacotes.forEach(p => {
    const card = document.createElement("div");

    card.style.background = "#111";
    card.style.padding = "15px";
    card.style.borderRadius = "12px";
    card.style.margin = "10px 0";
    card.style.border = "1px solid #A67360";

    card.innerHTML = `
      <h4 style="color:#d4af37;">${p.nome}</h4>
      <p style="font-size:14px; opacity:0.9;">${p.descricao}</p>
      ${p.preco ? `<strong style="color:#25D366;">R$ ${p.preco}</strong>` : ""}
      <br><br>
      <button class="opcao" onclick="interessePacote('${p.nome}', ${p.preco})">
        Assinar Pacote
      </button>
    `;

    div.appendChild(card);
  });
}

async function interessePacote(nomePacote, preco){
  const nome = prompt("Digite seu nome completo!:");

  if(!nome) return alert("👤 Nome obrigatório!");

  // 🔥 SALVA NO FIREBASE
  await db.collection("assinaturas").add({
    nome: nome,
    pacote: nomePacote,
    preco: preco || 0,
    validade: "2026-05-10",
    usos: 0,
    status: "pendente",
    data: new Date().toISOString()
  });

  // 🔥 MENSAGEM WHATSAPP
  const msg = `🔥 *ASSINATURA DE PACOTE*\n\n` +
              `👤 Nome: ${nome}\n` +
              `📦 Pacote: ${nomePacote}\n` +
              `💰 Valor: R$ ${preco}\n\n` +
              `📲 Envie o comprovante do PIX para confirmar.`;

  window.open(`https://wa.me/5521999999999?text=${encodeURIComponent(msg)}`, '_blank');           // ALTERE AQUI TBM

  alert("✅ Pedido enviado! Envie o comprovante no WhatsApp.PIX:xxxx-xxxx");
}
async function verificarAssinatura(nomeCliente){
  const snapshot = await db.collection("assinaturas")
    .where("nome", "==", nomeCliente)
    .get();

  if(snapshot.empty) return false;

  let valido = false;

  snapshot.forEach(doc => {
    const a = doc.data();

    if(a.status === "pago" && a.validade){
      const hoje = new Date();
      const validade = new Date(a.validade);

      if(validade >= hoje){
        valido = true;
      }
    }
  });

  return valido;
}
async function verificarLimite(nomeCliente){
  const snapshot = await db.collection("assinaturas")
    .where("nome", "==", nomeCliente)
    .get();

  if(snapshot.empty) return { permitido:false };

  let permitido = false;
  let docRef = null;

  for(const doc of snapshot.docs){
    const a = doc.data();

    if(a.status === "pago"){
      const pacoteDoc = await db.collection("pacotes")
        .where("nome", "==", a.pacote)
        .get();

      if(!pacoteDoc.empty){
        const pacote = pacoteDoc.docs[0].data();
        const limite = pacote.limite || 0;
        const usos = a.usos || 0;

        if(usos < limite){
          permitido = true;
          docRef = doc.ref;
        }
      }
    }
  }

  return { permitido, docRef };
}

function formatarDataLocal(data) {
  const ano = data.getFullYear();
  const mes = String(data.getMonth() + 1).padStart(2, '0');
  const dia = String(data.getDate()).padStart(2, '0');
  return `${ano}-${mes}-${dia}`;
}


function escutarDadosTempoReal() {

  // 🔥 AGENDA EM TEMPO REAL
  db.collection("agenda").onSnapshot(snapshot => {
    agenda = {};

    snapshot.forEach(doc => {
      agenda[doc.id] = doc.data();
    });

    atualizarTela();
  });

  // 🔥 BLOQUEIOS EM TEMPO REAL
  db.collection("config").doc("bloqueios")
    .onSnapshot(doc => {
      bloqueios = doc.exists ? doc.data() : {};
      atualizarTela();
    });

  // 🔥 DIAS FECHADOS EM TEMPO REAL
  db.collection("config").doc("diasFechados")
    .onSnapshot(doc => {
      diasFechados = doc.exists ? doc.data().lista : [];
      atualizarTela();
    });
  db.collection("config").doc("horariosExtras")
  .onSnapshot(doc => {
    horariosExtras = doc.exists ? doc.data() : {};
    atualizarTela();
  });
}
function atualizarTela() {
  gerarCalendario();

  // 🔥 Se já escolheu data e profissional, atualiza horários automaticamente
  if(dataSelecionada && profissional){
    escolherProfissional(profissional);
  }
}

// 🔥🔥🔥 AQUI VOCÊ MUDA OS PROFISSIONAIS E HORÁRIOS DISPONÍVEIS 🔥🔥🔥
const PROFISSIONAIS = [
  {
    nome: "Val",
    horarios: ['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00']
  },
  {
    nome: "Thiago", 
    horarios: ['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00']
  },
  
  // 🔥 ADICIONE MAIS PROFISSIONAIS AQUI:
  // {

  //   horarios: ['09:00','10:00','11:00','12:00','13:00','14:00']
  // }
];

//ALTERACOES DE SERVICOS
const servicos = {
  "Pezinho":10,
  "Corte Simples": 25,
  "Corte Disfarçado":35,
  "Corte Máq E Tes":35,
  "Cavanhaque (a partir)":10,
  "Sombrancelha":10,
  "Corte + Sombrancelha": 40,

  "Barba Modelada":25,

  "Pigmentação": 20,

function mostrarTela(telaId) {
  const telas = ["servicos", "profissionais", "horarios", "resumo"];

  telas.forEach(id => {
    const el = document.getElementById(id);
    if(el){
      el.style.display = (id === telaId) ? "block" : "none";
      if(id !== telaId) el.innerHTML = el.innerHTML; // limpa bugs visuais
    }
  });
}

function gerarCalendario() {
  const div = document.getElementById("calendario");
  div.innerHTML = "";
  const hoje = new Date();
  
  for(let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(hoje.getDate() + i);
    const dataISO = formatarDataLocal(d);
    
    const estaFechado = Array.isArray(diasFechados) && diasFechados.includes(dataISO);
    
    const btn = document.createElement("div");
    btn.className = `dia ${estaFechado ? 'fechado' : ''}`;
    btn.innerHTML = `
      <strong>${d.getDate()}</strong><br>
      <small>${d.toLocaleDateString("pt-BR",{weekday:"short"})}</small>
      ${estaFechado ? '<br><small style="color:#e74c3c">FECHADO</small>' : ''}
    `;
    
    if(!estaFechado) {
      btn.onclick = () => {
        dataSelecionada = dataISO;
        document.querySelectorAll(".dia").forEach(el => el.classList.remove("ativo"));
        btn.classList.add("ativo");
        document.getElementById("dataEscolhida").innerText = d.toLocaleDateString("pt-BR", {
          weekday: "long", day: "numeric", month: "long"
        });
      };
    }
    
    div.appendChild(btn);
  }
}

function resetar() {
  mostrarTela(null);
}

function mostrarServicos() {
  mostrarTela("servicos");
  const div = document.getElementById("servicos");
  div.style.display = "block";
  div.innerHTML = "<h3>✂️ Escolha o Serviço</h3>";
  
  Object.entries(servicos).forEach(([n, v]) => {
    const btn = document.createElement("button");
    btn.className = "opcao";
    btn.innerText = `${n} - R$${v}`;
    btn.onclick = () => escolherServico(n);
    div.appendChild(btn);
  });
}

function escolherServico(nome) {
  if(!dataSelecionada) return alert("👆 Primeiro escolha um DIA!");
  nomeServico = nome;
  document.getElementById("servicos").style.display = "none";

  document.getElementById("horarios").innerHTML = "";
  // 🔥 PROFISSIONAIS ESTÁTICOS - SEMPRE MOSTRA TODOS
  const div = document.getElementById("profissionais");
  div.style.display = "block";
  div.innerHTML = `<button class="voltar" onclick="mostrarServicos()">⬅ Voltar</button><h3>👨‍💼 Escolha o Profissional</h3>`;
  
  PROFISSIONAIS.forEach(prof => {
    const btn = document.createElement("button");
    btn.className = "opcao";
    btn.innerText = prof.nome;
    btn.onclick = () => escolherProfissional(prof.nome);
    div.appendChild(btn);
  });
}

function escolherProfissional(p) {
  profissional = p;

  // 🔥 CONTROLE PROFISSIONAL DE TELA
  mostrarTela("horarios");

  const div = document.getElementById("horarios");
  div.innerHTML = `
    <button class="voltar" onclick="escolherServico(nomeServico)">⬅ Voltar</button>
    <h3>🕒 Horários Disponíveis</h3>
    <div class="horarios-grid" id="gridHorarios"></div>
  `;
  
  const profSelecionado = PROFISSIONAIS.find(prof => prof.nome === p);

  if (!profSelecionado) {
    console.error("Profissional não encontrado:", p);
    return;
  }
  const grid = document.getElementById("gridHorarios");
  grid.innerHTML = "";
  // horários fixos do profissional
  const horariosFixos = profSelecionado.horarios;

// busca do documento config/horariosExtras
  const extrasHoje =
    horariosExtras?.[p]?.[dataSelecionada] || [];

  // junta fixos + extras
  const todosHorarios = [...new Set([
    ...horariosFixos,
    ...extrasHoje
  ])].sort((a, b) => a.localeCompare(b));

  const horariosOcupados = agenda[dataSelecionada]?.[p] || [];
  const bloqueados = (bloqueios?.[dataSelecionada]?.[p]) || []; 
  
     
  todosHorarios.forEach(h => {
  const listaOcupados = Array.isArray(horariosOcupados) ? horariosOcupados : [];
  const ocupado = listaOcupados.some(x => (x.horario || x) === h);
  const bloqueado = bloqueados.includes(h);

  const agora = new Date();
  const dataHora = new Date(`${dataSelecionada}T${h}`);
  const passou = dataHora < agora;

  // 🔥 SE NÃO PODE SER SELECIONADO → SIMPLESMENTE IGNORA
 // 🔥 horário passado some
  if (passou) {
    return;
  }

  const btn = document.createElement("div");

  // 🔥 horário ocupado continua aparecendo
  if (ocupado) {
    btn.className = "horario-btn ocupado";
    btn.innerHTML = `<span>❌ ${h}</span>`;
  }

  // 🔥 horário bloqueado continua aparecendo
  else if (bloqueado) {
    btn.className = "horario-btn bloqueado";
    btn.innerHTML = `<span>🔒 ${h}</span>`;
  }

  // 🔥 horário disponível
  else {
    btn.className = "horario-btn";
    btn.innerHTML = `<span style="color:#25D366">✅ ${h}</span>`;
    btn.onclick = () => finalizar(h);
  }

  grid.appendChild(btn);
});



if (grid.children.length === 0) {
  grid.innerHTML = `<p style="opacity:0.7">😕 Nenhum horário disponível</p>`;
}
}

async function carregarHorariosExtras() {
  const doc = await db.collection("config")
    .doc("horariosExtras")
    .get();

  if (doc.exists) {
    horariosExtras = doc.data();
  }
}

function finalizar(h) {
  horario = h;
  
  // 🔥 NÃO OCUPA A AGENDA AQUI - só mostra resumo
  document.getElementById("horarios").style.display = "none";
  document.getElementById("resumo").style.display = "block";
  document.getElementById("resumo").innerHTML = `
    <button class="voltar" onclick="escolherProfissional(profissional)">⬅ Voltar Horários</button>
    <h3>✅ Confirme seu agendamento!</h3>
    <div style="background: rgba(76,175,80,0.2); padding: 20px; border-radius: 15px; margin: 15px 0; border: 2px solid #4CAF50;">
      <strong>📅 Data:</strong> ${document.getElementById("dataEscolhida").innerText}<br>
      <strong>✂️ Serviço:</strong> ${nomeServico}<br>
      <strong>👨‍💼 Profissional:</strong> ${profissional}<br>
      <strong>🕒 Horário:</strong> ${h}
    </div>
    <input class="input-nome" id="nomeCliente" placeholder="👤 Seu nome completo *" required>
    <button class="whatsapp" onclick="confirmarAgendamento()">

    </button>

      * Clique para confirmar e reservar o horário

  `;
}

async function confirmarAgendamento() {
  const nome = document.getElementById("nomeCliente").value.trim();
  if(!nome) return alert("👤 Digite seu nome completo!");

  let usarPacote = false;
  let docRef = null;

  // 🔥 TENTA BUSCAR ASSINATURA (MAS NÃO OBRIGA)
  const snap = await db.collection("assinaturas")
    .where("nome", "==", nome)
    .get();

  if(!snap.empty){
    const assinatura = snap.docs[0].data();

    // 🔥 SE TEM ASSINATURA PAGA → VERIFICA LIMITE
    if(assinatura.status === "pago"){
      const pacoteSnap = await db.collection("pacotes")
        .where("nome", "==", assinatura.pacote)
        .get();

      if(!pacoteSnap.empty){
        const pacote = pacoteSnap.docs[0].data();

        const limite = pacote.limite || 0;
        const usos = assinatura.usos || 0;

        if(usos < limite){
          usarPacote = true;
          docRef = snap.docs[0].ref;
        } else {
          alert("⚠️ Seu pacote acabou, mas você pode agendar normalmente.");
        }
      }
    }
  }

  // 🔥 SALVAR AGENDAMENTO (LIBERADO PRA TODOS)
  const ref = db.collection("agenda").doc(dataSelecionada);
  const doc = await ref.get();
  
  let dados = doc.exists ? doc.data() : {};

  if(!dados[profissional]) dados[profissional] = [];

  const jaExiste = dados[profissional].some(x => (x.horario || x) === horario);

  if(jaExiste){
    return alert("❌ Esse horário acabou de ser ocupado!");
  }

  dados[profissional].push({
    horario: horario,
    nome: nome,
    servicos: nomeServico
  });

  await ref.set(dados);

  // 🔥 SÓ DESCONTA SE USOU PACOTE
  if(usarPacote && docRef){
    await docRef.update({
      usos: firebase.firestore.FieldValue.increment(1)
    });
  }
